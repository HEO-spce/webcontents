<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>설문지 만들기</title>
    </head>
    <body>
        <header>
        <h3>설문지</h3>

        소프트웨어 기술에 대한 의견을 듣습니다. 많은 참여 부탁드립니다.
        <hr>
        </header>
        <section>
            <article>
                <form>
                    학년 
                    <label><input type="radio" name="학년" value="1" checked>1학년</label>
                    <label><input type="radio" name="학년" value="2">2학년</label>
                    <label><input type="radio" name="학년" value="3">3학년</label><br>

                    성별
                    <label><input type="radio" name="성별" value="1">남</label>
                    <label><input type="radio" name="성별" value="2">여</label><br>

                    관심분야
                    <select name="관심분야">
                        <option value="1" selected>모바일 소프트웨어</option>
                        <option value="2">인공지능</option>
                        <option value="3">사물인터넷</option>
                        <option value="4">양자 컴퓨터</option>
                    </select><br>

                    진로
                    <label><input type="checkbox" value="1" checked>개발</label>
                    <label><input type="checkbox" value="2">기획</label>
                    <label><input type="checkbox" value="3">영업</label>
                    <label><input type="checkbox" value="4">창업</label><br>
                     남기고 싶은 말<br> 
                    <textarea cols="20" rows="5">글을 남겨주세요</textarea>
                </form>
            </article>
            <footer>
                2026년 4월 29일 작성
            </footer>
        </section>
    </body>
</html>
